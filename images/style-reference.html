<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; font-family: 'Inter', 'Helvetica Neue', sans-serif; background: #0f0f0f; color: #fff; }
  .pinterest-card {
    width: 1000px; height: 1500px;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 80px; box-sizing: border-box; overflow: hidden;
  }
  .brand { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .headline { font-size: 88px; font-weight: 800; line-height: 1.0; letter-spacing: -3px; color: #fff; max-width: 800px; }
  .headline em { font-style: normal; color: #6366f1; }
  .product-preview { width: 700px; border-radius: 16px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); transform: rotate(-3deg) translateX(80px); border: 1px solid rgba(255,255,255,0.1); }
  .cta { font-size: 18px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
  .cta strong { color: #6366f1; }
  .thumbnail-card {
    width: 600px; height: 600px;
    background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 48px; box-sizing: border-box; gap: 24px; text-align: center;
  }
  .thumbnail-card .headline { font-size: 42px; max-width: 100%; }
</style>
</head>
<body>
<!-- Pinterest 1000x1500 -->
<div class="pinterest-card">
  <div class="brand">Tinycraft</div>
  <div><div class="headline">Build the habit.<br><em>Keep the streak.</em></div></div>
  <img class="product-preview" src="" alt="">
  <div class="cta">Free to download · <strong>Pay what you want</strong></div>
</div>
</body>
</html>
